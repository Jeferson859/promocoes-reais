<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Promoções Reais | As Melhores Ofertas e Cupons</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .promo-card:hover { transform: translateY(-5px); transition: 0.3s; }
        .logo-box { transform: rotate(-3deg); }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">

    <header class="bg-blue-700 text-white shadow-xl sticky top-0 z-50">
        <div class="container mx-auto px-4 py-3 flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-2">
                <div class="logo-box bg-yellow-400 text-blue-800 px-3 py-1 rounded-lg font-black text-xl shadow-md">
                    REAIS
                </div>
                <h1 class="text-2xl font-black tracking-tighter uppercase">Promoções</h1>
            </div>
            
            <div class="relative w-full md:w-96">
                <input type="text" id="searchInput" placeholder="Pesquisar produto ou marca..." 
                    class="w-full p-3 rounded-xl text-slate-800 pl-12 focus:ring-4 focus:ring-yellow-400 outline-none transition">
                <i class="fas fa-search absolute left-4 top-4 text-slate-400"></i>
            </div>
        </div>
    </header>

    <div class="bg-white border-b border-slate-200 py-4 overflow-x-auto">
        <div class="container mx-auto px-4 flex gap-3 whitespace-nowrap">
            <button onclick="filterPromo('todos')" class="px-5 py-2 rounded-full bg-blue-600 text-white font-bold text-sm shadow-md">Todos</button>
            <button onclick="filterPromo('eletronicos')" class="px-5 py-2 rounded-full bg-slate-100 hover:bg-blue-100 font-medium text-sm transition text-slate-600">Eletrônicos</button>
            <button onclick="filterPromo('casa')" class="px-5 py-2 rounded-full bg-slate-100 hover:bg-blue-100 font-medium text
