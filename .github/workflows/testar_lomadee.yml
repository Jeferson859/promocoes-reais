name: Testar Lomadee

on:
  workflow_dispatch:

jobs:
  testar:
    runs-on: ubuntu-latest
    steps:
      - name: Testar dominios Lomadee
        continue-on-error: true
        run: |
          echo "=== DNS lookup ==="
          nslookup api.lomadee.com || echo "DNS falhou"

          echo "=== api.lomadee.com ==="
          curl -s --max-time 10 "https://api.lomadee.com/v3/mMxCxyI6u2AKiIDY9v27zMUiUKBfQvm_/offer/_search?sourceId=2324685&size=1" || echo "FALHOU"

          echo "=== sandbox.lomadee.com ==="
          curl -s --max-time 10 "https://sandbox.lomadee.com/v3/mMxCxyI6u2AKiIDY9v27zMUiUKBfQvm_/offer/_search?sourceId=2324685&size=1" || echo "FALHOU"

          echo "=== Fim dos testes ==="
