name: Teste Bruto
on:
  workflow_dispatch:
jobs:
  envio:
    runs-on: ubuntu-latest
    steps:
      - name: Grito no Telegram
        run: |
          curl -v -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d text="Jeferson, se voce ler isso, o GitHub finalmente conectou!"
