name: Teste de Raio-X Corrigido
on:
  workflow_dispatch:
jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Rodar Busca
        run: node atualizar_ofertas.js

      - name: Disparar no Telegram (Modo Seguro)
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          # Pega os dados e remove espaços vazios dos links
          TITULO=$(node -e "console.log(require('./ofertas.json')[0].titulo)")
          PRECO=$(node -e "console.log(require('./ofertas.json')[0].preco)")
          LINK=$(node -e "console.log(require('./ofertas.json')[0].link.trim())")
          
          # Envia apenas TEXTO primeiro para confirmar o Chat ID
          curl -s -X POST "https://api.telegram.org/bot$TELEGRAM_TOKEN/sendMessage" \
            -d chat_id="$TELEGRAM_CHAT_ID" \
            -d text="🚀 *TESTE DE CONEXÃO* %0A%0A📦 $TITULO %0A💰 R$ $PRECO %0A🔗 $LINK" \
            -d parse_mode="Markdown"
