name: Robô de Ofertas Alto Volume
on:
  schedule:
    - cron: '*/5 * * * *' # Roda a cada 5 minutos para máximo volume
  workflow_dispatch:      # Permite rodar manualmente pelo botão

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Buscar Novas Ofertas (Lomadee)
        env:
          LOMADEE_TOKEN: ${{ secrets.LOMADEE_TOKEN }}
        run: node atualizar_ofertas.js || echo "Aguardando liberação da API Lomadee..."

      - name: Disparar no Telegram
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          # Verifica se o arquivo existe e tem ofertas
          if [ -s ofertas.json ]; then
            # Pega a primeira oferta da lista (o script JS já embaralha elas)
            TITULO=$(node -e "const f=require('./ofertas.json'); console.log(f[0].titulo || 'Produto s/ Nome')")
            PRECO=$(node -e "const f=require('./ofertas.json'); console.log(f[0].preco || 'Consultar')")
            LINK=$(node -e "const f=require('./ofertas.json'); console.log(f[0].link || '#')")
            IMG=$(node -e "const f=require('./ofertas.json'); console.log(f[0].img || 'https://i.imgur.com/866uM8r.png')")

            # Montagem da mensagem estilo Profissional (PC do Fafa)
            MESSAGE="🔵 *${TITULO}*%0A%0A💰 *R$ ${PRECO}* à vista%0A💳 em até 10x no cartão%0A%0A🛒 *Compre aqui:*%0A${LINK}%0A%0A⚠️ *O preço pode mudar a qualquer momento!*"

            curl -s -X POST "https://api.telegram.org/bot$TELEGRAM_TOKEN/sendPhoto" \
              -d chat_id="$TELEGRAM_CHAT_ID" \
              -d photo="$IMG" \
              -d caption="$MESSAGE" \
              -d parse_mode="Markdown"
          else
            echo "Nenhuma oferta nova encontrada no momento."
          fi

      - name: Salvar progresso no GitHub
        run: |
          git config --global user.name 'bot-ofertas'
          git config --global user.email 'bot@github.com'
          git add .
          git commit -m "Sincronizando base de ofertas" || exit 0
          git push
