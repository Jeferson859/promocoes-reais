name: Teste Foto
on:
  workflow_dispatch:
jobs:
  postar:
    runs-on: ubuntu-latest
    steps:
      - name: Enviar Foto Direto
        run: |
          curl -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendPhoto" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d photo="https://m.media-amazon.com/images/I/71657ZfeZNL._AC_SL1500_.jpg" \
            -d caption="Teste de Foto e Texto"
