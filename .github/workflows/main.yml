- name: Enviar ao Telegram
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          # Extração dos dados
          TITULO=$(node -e "console.log(require('./ofertas.json')[0].titulo)")
          PRECO=$(node -e "console.log(require('./ofertas.json')[0].preco)")
          LINK=$(node -e "console.log(require('./ofertas.json')[0].link)")
          IMG=$(node -e "console.log(require('./ofertas.json')[0].img)")

          # Nova Mensagem: A imagem vai dentro do texto para evitar o erro 400
          MSG="<a href='$IMG'>&#8205;</a><b>🟡 ${TITULO}</b>%0A%0A💰 <b>R$ ${PRECO}</b>%0A%0A🛒 <b>Compre aqui:</b>%0A${LINK}"

          # Usamos o sendMessage (mais estável que o sendPhoto)
          curl -s -X POST "https://api.telegram.org/bot$TELEGRAM_TOKEN/sendMessage" \
            -d chat_id="$TELEGRAM_CHAT_ID" \
            -d text="$MSG" \
            -d parse_mode="HTML"
