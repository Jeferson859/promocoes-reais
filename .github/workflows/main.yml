name: Robô PROMOREAIS Oficial
on:
  schedule:
    - cron: '*/10 * * * *' # Roda a cada 10 minutos
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Rodar Script de Busca
        run: node atualizar_ofertas.js

      - name: Enviar para o Telegram
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          # Verifica se o arquivo tem ofertas
          COUNT=$(node -e "try { console.log(require('./ofertas.json').length) } catch(e) { console.log(0) }")
          
          if [ "$COUNT" -gt 0 ]; then
            TITULO=$(node -e "console.log(require('./ofertas.json')[0].titulo)")
            PRECO=$(node -e "console.log(require('./ofertas.json')[0].preco)")
            LINK=$(node -e "console.log(require('./ofertas.json')[0].link)")
            IMG=$(node -e "console.log(require('./ofertas.json')[0].img)")

            MESSAGE="🟡 *${TITULO}*%0A%0A💰 *R$ ${PRECO}* à vista%0A%0A🛒 *Compre aqui:*%0A${LINK}"

            curl -s -X POST "https://api.telegram.org/bot$TELEGRAM_TOKEN/sendPhoto" \
              -d chat_id="$TELEGRAM_CHAT_ID" \
              -d photo="$IMG" \
              -d caption="$MESSAGE" \
              -d parse_mode="Markdown"
          else
            echo "Aguardando novas ofertas..."
          fi

      - name: Salvar no GitHub
        run: |
          git config --global user.name 'bot-promoreais'
          git config --global user.email 'bot@github.com'
          git add .
          git commit -m "update" || exit 0
          git push
