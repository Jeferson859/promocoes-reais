name: Robo PROMOREAIS Profissional
on:
  workflow_dispatch:
  schedule:
    - cron: '*/15 * * * *'

jobs:
  postar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Rodar Motor do Robo
        env:
          TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: node atualizar_ofertas.js
