name: Robo PROMOREAIS
on:
  workflow_dispatch:
  schedule:
    - cron: '*/30 * * * *'

jobs:
  postar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Buscar
        run: node atualizar_ofertas.js

      - name: Enviar
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          # Extração dos dados
          TITULO=$(node -e "console.log(require('./temp_oferta.json').titulo)")
          PRECO=$(node -e "console.log(require('./temp_oferta.json').preco)")
          LINK=$(node -e "console.log(require('./temp_oferta.json').link)")
          IMG=$(node -e "console.log(require('./temp_oferta.json').img)")

          MSG="🟡 *${TITULO}*%0A%0A💰 *R$ ${PRECO}*%0A%0A🛒 *Compre aqui:*%0A${LINK}"

          # TENTATIVA 1: Enviar com Foto
          RESPONSE=$(curl -s -X POST "https://api.telegram.org/bot$TELEGRAM_TOKEN/sendPhoto" \
            -d chat_id="$TELEGRAM_CHAT_ID" \
            -d photo="$IMG" \
            -d caption="$MSG" \
            -d parse_mode="Markdown")

          # SE DER ERRO NA FOTO, TENTATIVA 2: Enviar apenas Texto
          if [[ $RESPONSE != *"\"ok\":true"* ]]; then
            echo "Erro ao enviar foto, tentando apenas texto..."
            curl -s -X POST "https://api.telegram.org/bot$TELEGRAM_TOKEN/sendMessage" \
              -d chat_id="$TELEGRAM_CHAT_ID" \
              -d text="$MSG" \
              -d parse_mode="Markdown"
          else
            echo "✅ Postado com sucesso!"
          fi
