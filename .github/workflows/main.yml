- name: Enviar para o Telegram
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          # Tenta enviar uma mensagem simples primeiro para testar a conexão
          RESPONSE=$(curl -s -X POST "https://api.telegram.org/bot$TELEGRAM_TOKEN/sendMessage" \
            -d chat_id="$TELEGRAM_CHAT_ID" \
            -d text="🤖 Robô de Promoções Ativado! O sistema está conectado com sucesso.")
          
          echo "Resposta do Telegram: $RESPONSE"
          
          if [[ $RESPONSE == *"\"ok\":true"* ]]; then
            echo "Mensagem enviada com sucesso!"
          else
            echo "Erro ao enviar mensagem. Verifique o Token e o ID."
            exit 1
          fi
