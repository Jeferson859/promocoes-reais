name: Robo PROMOREAIS
on:
  workflow_dispatch:
  schedule:
    - cron: '*/15 * * * *' # AGORA POSTA A CADA 15 MINUTOS

jobs:
  postar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Buscar Produto
        run: node atualizar_ofertas.js

      - name: Enviar ao Telegram
        env:
          TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          TITULO=$(node -e "console.log(require('./temp_oferta.json').titulo)")
          PRECO=$(node -e "console.log(require('./temp_oferta.json').preco)")
          LINK=$(node -e "console.log(require('./temp_oferta.json').link)")
          IMG=$(node -e "console.log(require('./temp_oferta.json').img)")

          # MENSAGEM HTML COM FOTO
          MSG="<b>🟡 ${TITULO}</b>%0A💰 <b>R$ ${PRECO}</b>%0A%0A🛒 <b>Compre aqui:</b>%0A${LINK}"

          # Tentativa com foto (sendPhoto)
          curl -s -X POST "https://api.telegram.org/bot$TOKEN/sendPhoto" \
            -d chat_id="$CHAT_ID" \
            -d photo="$IMG" \
            -d caption="$MSG" \
            -d parse_mode="HTML"
