name: Robô PROMOREAIS Automático
on:
  schedule:
    - cron: '*/15 * * * *' # Roda a cada 15 minutos
  workflow_dispatch:

jobs:
  postar:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Executar Busca de Ofertas
        run: node atualizar_ofertas.js

      - name: Enviar para o Telegram
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          # Extração segura dos dados do primeiro item da lista
          TITULO=$(node -e "const d=require('./ofertas.json'); console.log(d[0].titulo)")
          PRECO=$(node -e "const d=require('./ofertas.json'); console.log(d[0].preco)")
          LINK=$(node -e "const d=require('./ofertas.json'); console.log(d[0].link)")
          IMG=$(node -e "const d=require('./ofertas.json'); console.log(d[0].img)")

          # Mensagem formatada em HTML (mais estável para links longos)
          MSG="<b>🟡 ${TITULO}</b>%0A%0A💰 <b>R$ ${PRECO}</b> à vista%0A%0A🛒 <b>Compre aqui:</b>%0A${LINK}"

          # Envio da Foto com a Legenda
          curl -s -X POST "https://api.telegram.org/bot$TELEGRAM_TOKEN/sendPhoto" \
            -d chat_id="$TELEGRAM_CHAT_ID" \
            -d photo="$IMG" \
            -d caption="$MSG" \
            -d parse_mode="HTML"

      - name: Salvar Histórico no GitHub
        run: |
          git config --global user.name 'bot-promoreais'
          git config --global user.email 'bot@github.com'
          git add .
          git commit -m "Atualização de ofertas" || exit 0
          git push
