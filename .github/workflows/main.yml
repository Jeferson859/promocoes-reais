name: Teste Forçado iPhone
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Enviar iPhone do Arquivo
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          # Pega os dados direto do arquivo ofertas.json
          TITULO=$(node -e "console.log(require('./ofertas.json')[0].titulo)")
          PRECO=$(node -e "console.log(require('./ofertas.json')[0].preco)")
          IMG=$(node -e "console.log(require('./ofertas.json')[0].img)")
          LINK=$(node -e "console.log(require('./ofertas.json')[0].link)")
          
          curl -s -X POST "https://api.telegram.org/bot$TELEGRAM_TOKEN/sendPhoto" \
            -d chat_id="$TELEGRAM_CHAT_ID" \
            -d photo="$IMG" \
            -d caption="🚀 *TESTE DE ENVIO* %0A%0A📦 $TITULO %0A💰 *R$ $PRECO* %0A%0A🔗 [CLIQUE AQUI]($LINK)" \
            -d parse_mode="Markdown"
