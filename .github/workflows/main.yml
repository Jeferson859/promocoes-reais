name: Teste Foto Garantido
on:
  workflow_dispatch:
jobs:
  postar:
    runs-on: ubuntu-latest
    steps:
      - name: Enviar Foto Direto
        run: |
          curl -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendPhoto" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d photo="https://raw.githubusercontent.com/Jeferson859/promocoes-reais/main/index.html" \
            -d caption="✅ TESTE DE CONEXÃO: O robô agora consegue enviar fotos e textos!" \
            --fail
