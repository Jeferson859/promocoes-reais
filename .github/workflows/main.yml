name: Robo PROMOREAIS
on:
  workflow_dispatch:
  schedule:
    - cron: '*/30 * * * *'

jobs:
  postar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Buscar
        run: node atualizar_ofertas.js

      - name: Enviar
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          # Extração dos dados via Node
          TITULO=$(node -e "console.log(require('./temp_oferta.json').titulo)")
          PRECO=$(node -e "console.log(require('./temp_oferta.json').preco)")
          LINK=$(node -e "console.log(require('./temp_oferta.json').link)")
          IMG=$(node -e "console.log(require('./temp_oferta.json').img)")

          # MENSAGEM EM HTML (Mais resistente a erros)
          # Usamos tags <b> para negrito e 🛒 para ícones
          MSG="<b>🟡 ${TITULO}</b>%0A%0A💰 <b>R$ ${PRECO}</b>%0A%0A🛒 <b>Compre aqui:</b>%0A${LINK}"

          # Envio da Foto com legenda
          curl -s -X POST "https://api.telegram.org/bot$TELEGRAM_TOKEN/sendPhoto" \
            -d chat_id="$TELEGRAM_CHAT_ID" \
            -d photo="$IMG" \
            -d caption="$MSG" \
            -d parse_mode="HTML"
