name: Atualizar Ofertas e Telegram
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Rodar script de ofertas
        env:
          LOMADEE_TOKEN: ${{ secrets.LOMADEE_TOKEN }}
        run: node atualizar_ofertas.js || echo "Aviso: Erro no script, mas seguindo..."
        
      - name: Enviar para o Telegram
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot$TELEGRAM_TOKEN/sendMessage" \
            -d chat_id="$TELEGRAM_CHAT_ID" \
            -d text="🚀 Teste de Conexão: Se você recebeu isso, o robô está funcionando!"

      - name: Salvar resultados no GitHub
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add .
          git commit -m "Atualizando ofertas" || exit 0
          git push
