name: Teste de Raio-X
on:
  workflow_dispatch:
jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Rodar Busca
        env:
          LOMADEE_TOKEN: ${{ secrets.LOMADEE_TOKEN }}
        run: node atualizar_ofertas.js

      - name: Mostrar o que o robô achou
        run: |
          echo "=== CONTEÚDO DO ARQUIVO OFERTAS.JSON ==="
          cat ofertas.json || echo "ARQUIVO VAZIO OU NÃO CRIADO"
          echo "========================================="

      - name: Tentativa de Envio Direto
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          # Pega o primeiro título do arquivo
          TITULO=$(node -e "try { console.log(require('./ofertas.json')[0].titulo) } catch(e) { console.log('ERRO_NA_LEITURA') }")
          
          echo "Tentando enviar: $TITULO"
          
          curl -i -X POST "https://api.telegram.org/bot$TELEGRAM_TOKEN/sendMessage" \
            -d chat_id="$TELEGRAM_CHAT_ID" \
            -d text="🚨 TESTE REAL: O robô encontrou: $TITULO"
