name: Bot Ofertas Mercado Livre

on:
  schedule:
    - cron: '*/15 * * * *'  # A cada 15 minutos
  workflow_dispatch:

jobs:
  postar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Buscar oferta e postar no Telegram
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          MELI_CLIENT_ID: ${{ secrets.MELI_CLIENT_ID }}
          MELI_CLIENT_SECRET: ${{ secrets.MELI_CLIENT_SECRET }}
          ML_REFRESH: ${{ secrets.ML_REFRESH }}
        run: node atualizar_ofertas.js
