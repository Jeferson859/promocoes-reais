name: Atualizar Ofertas e Telegram
on:
  schedule:
    - cron: '0 * * * *' # Roda automaticamente toda hora
  workflow_dispatch:      # Permite rodar manual quando você quiser
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Rodar script de ofertas
        env:
          LOMADEE_TOKEN: ${{ secrets.LOMADEE_TOKEN }}
        run: node atualizar_ofertas.js
        
      - name: Enviar Oferta para o Telegram
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          # Pega a primeira oferta do arquivo gerado
          TITULO=$(node -e "const f=require('./ofertas.json'); console.log(f[0] && f[0].id !== 0 ? f[0].titulo : 'vazio')")
          
          if [ "$TITULO" != "vazio" ]; then
            PRECO=$(node -e "console.log(require('./ofertas.json')[0].preco)")
            LINK=$(node -e "console.log(require('./ofertas.json')[0].link)")
            IMG=$(node -e "console.log(require('./ofertas.json')[0].img)")
            
            MESSAGE="🔥 *OFERTA DO DIA!* 🔥%0A%0A📦 $TITULO%0A💰 *R$ $PRECO*%0A%0A🔗 [CLIQUE AQUI PARA COMPRAR]($LINK)"
            
            # Envia a foto com a legenda da oferta
            curl -s -X POST "https://api.telegram.org/bot$TELEGRAM_TOKEN/sendPhoto" \
              -d chat_id="$TELEGRAM_CHAT_ID" \
              -d photo="$IMG" \
              -d caption="$MESSAGE" \
              -d parse_mode="Markdown"
          fi

      - name: Salvar no GitHub
        run: |
          git config --global user.name 'Bot Promo'
          git config --global user.email 'bot@github.com'
          git add ofertas.json
          git commit -m "Atualizando ofertas" || exit 0
          git push
