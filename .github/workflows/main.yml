name: Robô Promo_Reais Oficial
on:
  schedule:
    - cron: '*/5 * * * *' # Roda a cada 5 minutos
  workflow_dispatch:      # Permite rodar manual

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Rodar Script de Ofertas
        env:
          LOMADEE_TOKEN: ${{ secrets.LOMADEE_TOKEN }}
          MELI_AFFILIATE_ID: ${{ secrets.MELI_AFFILIATE_ID }}
        run: node atualizar_ofertas.js

      - name: Enviar para o Telegram (Visual Profissional)
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          # Extrai e Limpa os dados (remove espaços e caracteres que quebram o envio)
          TITULO=$(node -e "console.log(require('./ofertas.json')[0].titulo.replace('*', ''))")
          PRECO=$(node -e "console.log(require('./ofertas.json')[0].preco)")
          LINK=$(node -e "console.log(require('./ofertas.json')[0].link.trim())")
          IMG=$(node -e "console.log(require('./ofertas.json')[0].img.trim())")

          # Montagem da Mensagem Estilo Canal de Ofertas
          MESSAGE="🟡 *${TITULO}*%0A%0A💰 *R$ ${PRECO}* à vista%0A💳 em até 10x no cartão%0A%0A🛒 *Compre aqui:*%0A${LINK}%0A%0A⚠️ *O preço pode mudar a qualquer momento!*"

          # Tenta enviar com foto, se der erro, envia só texto (segurança total)
          RESPONSE=$(curl -s -X POST "https://api.telegram.org/bot$TELEGRAM_TOKEN/sendPhoto" \
            -d chat_id="$TELEGRAM_CHAT_ID" \
            -d photo="$IMG" \
            -d caption="$MESSAGE" \
            -d parse_mode="Markdown")

          if [[ $RESPONSE != *"\"ok\":true"* ]]; then
            echo "Erro no envio com foto, tentando apenas texto..."
            curl -s -X POST "https://api.telegram.org/bot$TELEGRAM_TOKEN/sendMessage" \
              -d chat_id="$TELEGRAM_CHAT_ID" \
              -d text="$MESSAGE" \
              -d parse_mode="Markdown"
          fi

      - name: Sincronizar GitHub
        run: |
          git config --global user.name 'bot-promo-reais'
          git config --global user.email 'bot@github.com'
          git add .
          git commit -m "Sincronizando ofertas" || exit 0
          git push
