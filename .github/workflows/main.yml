- name: Enviar para o Telegram
        run: |
          # Verifica se o arquivo existe e tem conteúdo
          if [ -s ofertas.json ]; then
            # Tenta extrair os dados com segurança
            PROMO_TITULO=$(node -e "const f=require('./ofertas.json'); console.log(f[0] ? f[0].titulo : 'vazio')")
            
            if [ "$PROMO_TITULO" != "vazio" ] && [ "$PROMO_TITULO" != "Buscando novas ofertas Magalu..." ]; then
              PROMO_PRECO=$(node -e "console.log(require('./ofertas.json')[0].preco)")
              PROMO_LINK=$(node -e "console.log(require('./ofertas.json')[0].link)")
              
              MESSAGE="🚀 *OFERTA NOVA NO SITE!* %0A%0A📦 $PROMO_TITULO %0A💰 *R$ $PROMO_PRECO* %0A%0A🔗 *Confira agora:* $PROMO_LINK"
              
              curl -s -X POST https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage \
                -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
                -d text="$MESSAGE" \
                -d parse_mode="Markdown"
            else
              echo "Nenhuma oferta real para enviar agora."
            fi
          else
            echo "Arquivo ofertas.json está vazio."
          fi
