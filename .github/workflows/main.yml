name: Gerar Token ML

on:
  workflow_dispatch:
    inputs:
      code:
        description: 'Cole aqui o code TG-XXXXXXXXXX'
        required: true

jobs:
  gerar_token:
    runs-on: ubuntu-latest
    steps:
      - name: Gerar Access Token
        run: |
          curl -X POST "https://api.mercadolivre.com/oauth/token" \
            -d "grant_type=authorization_code" \
            -d "client_id=7346131242004348" \
            -d "client_secret=${{ secrets.ML_SECRET }}" \
            -d "code=${{ github.event.inputs.code }}" \
            -d "redirect_uri=https://leferson859.github.io/promocoes-reais"
