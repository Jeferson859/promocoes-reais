name: Teste Direto
on:
  workflow_dispatch:
jobs:
  testar:
    runs-on: ubuntu-latest
    steps:
      - name: Chamada Direta
        run: |
          curl -v -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d text="Jeferson, o robô está tentando falar!"
