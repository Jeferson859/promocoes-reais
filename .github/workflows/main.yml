name: Postar PROMOREAIS
on: [workflow_dispatch]

jobs:
  postar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Buscar
        run: node atualizar_ofertas.js
      - name: Enviar
        env:
          TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          TITULO=$(node -e "console.log(require('./ofertas.json')[0].titulo)")
          LINK=$(node -e "console.log(require('./ofertas.json')[0].link)")
          
          # Envio ultra simples: Apenas texto. Se este chegar, o problema era a foto.
          curl -X POST "https://api.telegram.org/bot$TOKEN/sendMessage" \
            -d chat_id="$CHAT_ID" \
            -d text="🟡 PROMOÇÃO REAIS: $TITULO %0A%0A 🛒 Link: $LINK"
