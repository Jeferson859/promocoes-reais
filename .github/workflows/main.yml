- name: Enviar ao Telegram
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          # Extração segura com Node
          TITULO=$(node -e "const d=require('./ofertas.json'); console.log(d[0]?.titulo || 'Oferta PROMOREAIS')")
          PRECO=$(node -e "const d=require('./ofertas.json'); console.log(d[0]?.preco || '')")
          LINK=$(node -e "const d=require('./ofertas.json'); console.log(d[0]?.link || '')")
          IMG=$(node -e "const d=require('./ofertas.json'); console.log(d[0]?.img || '')")

          # Mensagem usando TAGS HTML (Mais seguro que Markdown)
          MSG="<b>🟡 ${TITULO}</b>%0A💰 <b>R$ ${PRECO}</b>%0A%0A🛒 <b>Compre aqui:</b>%0A${LINK}"

          # Envio usando parse_mode=HTML
          curl -s -X POST "https://api.telegram.org/bot$TELEGRAM_TOKEN/sendPhoto" \
            -d chat_id="$TELEGRAM_CHAT_ID" \
            -d photo="$IMG" \
            -d caption="$MSG" \
            -d parse_mode="HTML"
